{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | EcoBin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(145deg, #81c784, #a5d6a7); /* softer green gradient */
}

.signup-box {
    width: 400px;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px);
    border-radius: 20px;
    padding: 35px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.25);
    color: white;
    animation: fadeIn 0.8s ease;
}

h3 {
    text-align: center;
    margin-bottom: 25px;
}

.form-control {
    border-radius: 10px;
    border: none;
    padding: 10px;
}

.form-control:focus {
    box-shadow: 0 0 8px rgba(255,255,255,0.6);
}

.btn-custom {
    background: white;
    color: #2e7d32;
    font-weight: bold;
    border-radius: 10px;
    transition: 0.3s;
}

.btn-custom:hover {
    background: #c8e6c9;
}

p.text-center a {
    color: white;
    font-weight: bold;
    text-decoration: none;
}

p.text-center a:hover {
    text-decoration: underline;
    color: #dcedc8;
}

@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}
</style>
</head>

<body>

{% if messages %}
  {% for message in messages %}
    <div class="alert alert-danger text-dark text-center">
      {{ message }}
    </div>
  {% endfor %}
{% endif %}

<div class="signup-box">
    <h3><b>Create Account</b></h3>

    <form method="post" action="{% url 'accounts:signup' %}">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" pattern="[A-Za-z]{3,}" title="Username must contain only letters and be at least 3 characters long" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="password2" required>
        </div>

        <button type="submit" class="btn btn-custom w-100">Sign Up</button>

        <p class="mt-3 text-center" style="color: black;">
            Already have an account?
            <a href="{% url 'accounts:login' %}">Login</a>
        </p>
    </form>
</div>
<script>
document.querySelector("form").addEventListener("submit", function(e){
    let pass = document.querySelector("[name=password]").value;
    let confirm = document.querySelector("[name=password2]").value;

    if(pass !== confirm){
        alert("❌ Passwords do not match!");
        e.preventDefault();
    }
});
</script>
</body>
</html>
