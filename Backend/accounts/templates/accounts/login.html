<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #2e7d32, #81c784);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', sans-serif;
        }

        .login-box {
            width: 380px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            color: white;
            animation: fadeIn 0.8s ease;
        }

        .login-box h4 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .form-control {
            border-radius: 10px;
            border: none;
            padding: 10px;
        }

        .form-control:focus {
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }

        .btn-custom {
            background: white;
            color: #2e7d32;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #c8e6c9;
        }

        a {
            color: #e8f5e9;
        }

        a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 6px;
            font-size: 14px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

    </style>

</head>

<body>

<div class="login-box">

    <h4>Welcome Back 👋</h4>

    {% if messages %}
      {% for message in messages %}
        <div class="alert alert-danger text-dark">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="post" action="{% url 'accounts:login' %}">
        {% csrf_token %}

        <div class="mb-3">
       <input type="text" name="username" class="form-control" placeholder="Username" pattern="[A-Za-z]{3,}"
title="Username must contain only letters (min 3 characters)"
required>        </div>

        <div class="mb-3">
<input type="password" name="password" class="form-control"placeholder="Password"minlength="6"title="Password must be at least 6 characters long" required>        </div>

        <button type="submit" class="btn btn-custom w-100">Login</button>
    </form>

    <p class="mt-3 text-center">
        Don't have an account?
        <a href="{% url 'accounts:signup' %}">Signup</a>
    </p>

</div>

</body>
</html>
