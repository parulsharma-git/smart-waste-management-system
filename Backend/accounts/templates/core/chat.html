{% load static %}

<!-- CHAT ICON -->
<div id="chatbotIcon">💬</div>

<!-- CHAT BOX -->
<div id="chatbotBox">

    <div class="chat-header">
        TrashBot 🤖
    </div>

    <div id="chatMessages">
        <div class="bot-msg">Hi 👋 How can I help you?</div>
    </div>

    <div class="chat-input">
        <input type="text" id="chatInput" placeholder="Type a message...">
        <button id="sendBtn">Send</button>
    </div>

</div>
<style>
#chatbotIcon{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    background:#2e7d32;
    color:white;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    cursor:pointer;
    z-index:9999;
}

#chatbotBox{
    position:fixed;
    bottom:90px;
    right:20px;
    width:320px;
    height:400px;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
    display:none;
    flex-direction:column;
    overflow:hidden;
    z-index:9999;
}

.chat-header{
    background:#2e7d32;
    color:white;
    padding:10px;
    font-weight:bold;
}

#chatMessages{
    flex:1;
    padding:10px;
    overflow-y:auto;
}

.chat-input{
    display:flex;
    border-top:1px solid #ddd;
}

.chat-input input{
    flex:1;
    border:none;
    padding:8px;
}

.chat-input button{
    background:#2e7d32;
    color:white;
    border:none;
    padding:8px 12px;
}

.bot-msg{
    background:#f1f1f1;
    padding:6px 10px;
    border-radius:10px;
    display:inline-block;
}
</style>
